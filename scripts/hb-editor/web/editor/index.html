<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hb-gpu editor</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 960px; padding: 0 1rem; }
    .editor-wrap { position: relative; }
    canvas { width: 100%; height: 360px; border: 1px solid #bbb; border-radius: 4px; display: block; cursor: text; touch-action: none; }
    /* Hidden input proxy: keeps focus + receives keyboard/IME/clipboard events. */
    #input-proxy {
      position: absolute; left: 0; top: 0; width: 1px; height: 1px;
      opacity: 0; border: none; padding: 0; resize: none; outline: none;
      overflow: hidden; pointer-events: none;
    }
    #status { color: #666; font-size: 0.9rem; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <h1>hb-gpu editor</h1>
  <p>Every keystroke reshapes with HarfBuzz and re-renders glyph outlines on the
     GPU (Slug algorithm, WebGL2). No glyph bitmaps anywhere.
     <a href="../">playground</a> · <a href="../compare/">quality comparison</a> · <a href="../bench/">zoom benchmark</a></p>
  <div class="row">
    <label>font
      <select id="font">
        <option value="EBGaramond" selected>EB Garamond (fi/ffi ligatures)</option>
        <option value="Inter">Inter (no f-ligatures by design)</option>
        <option value="FiraCode">Fira Code (caret-safe programming ligatures)</option>
      </select>
    </label>
  </div>
  <div class="editor-wrap">
    <canvas id="canvas"></canvas>
    <textarea id="input-proxy" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
  </div>
  <p id="status">loading wasm…</p>
  <script type="module" src="./main.mjs"></script>
</body>
</html>
