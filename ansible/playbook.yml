---
# Provision the Hetzner box for filipkunc.com Phase 1.
#
# First run: `ansible_user: root` (Hetzner Debian 12 default).
# This playbook is idempotent — re-run anytime.
#
# The playbook does NOT start the app unit. The first `./deploy.sh` builds the
# image (which makes `localhost/filipkunc-com:latest` exist) and then starts
# the systemd user unit. Until then, the Quadlet file is in place but inert.

- name: Provision filipkunc.com box
  hosts: all
  become: true
  vars:
    caddy_keyring: /usr/share/keyrings/caddy-stable-archive-keyring.gpg

  tasks:
    # --- base ---------------------------------------------------------------

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - podman
          - uidmap
          - slirp4netns
          - fuse-overlayfs
          - rsync
          - apt-transport-https
          - debian-keyring
          - debian-archive-keyring
        state: present

    # --- ssh hardening ------------------------------------------------------
    # Ubuntu 24.04's sshd_config includes /etc/ssh/sshd_config.d/*.conf, and
    # cloud images sometimes ship drop-ins that re-enable password auth. A
    # numbered-last drop-in is the robust place to harden.

    - name: SSH hardening drop-in
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PermitRootLogin prohibit-password
      notify: restart sshd

    # --- firewall -----------------------------------------------------------

    - name: UFW — default deny incoming
      ansible.builtin.command: ufw default deny incoming
      register: ufw_in
      changed_when: "'incoming policy changed' in ufw_in.stdout"

    - name: UFW — default allow outgoing
      ansible.builtin.command: ufw default allow outgoing
      register: ufw_out
      changed_when: "'outgoing policy changed' in ufw_out.stdout"

    - name: UFW — allow ssh/http/https
      ansible.builtin.command: "ufw allow {{ item }}/tcp"
      loop: ['22', '80', '443']
      register: ufw_allow
      changed_when: "'Rules updated' in ufw_allow.stdout"

    - name: UFW — enable
      ansible.builtin.command: ufw --force enable
      register: ufw_enable
      changed_when: "'active' not in ufw_enable.stdout or 'enabled' in ufw_enable.stdout"

    # --- deploy user --------------------------------------------------------

    - name: Deploy user account
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Authorize laptop SSH key for deploy user
      ansible.posix.authorized_key:
        user: "{{ deploy_user }}"
        state: present
        key: "{{ lookup('file', deploy_pubkey_file) }}"

    - name: Enable linger (rootless user-systemd persists across logout)
      ansible.builtin.command: "loginctl enable-linger {{ deploy_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ deploy_user }}"

    # --- caddy --------------------------------------------------------------

    - name: Caddy apt signing key
      ansible.builtin.shell: |
        set -eo pipefail
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
          | gpg --dearmor -o {{ caddy_keyring }}
      args:
        creates: "{{ caddy_keyring }}"
        executable: /bin/bash

    - name: Caddy apt repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/caddy-stable.list
        mode: '0644'
        content: |
          deb [signed-by={{ caddy_keyring }}] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
      register: caddy_repo

    - name: Apt update (caddy repo just added)
      ansible.builtin.apt:
        update_cache: true
      when: caddy_repo.changed

    - name: Install Caddy
      ansible.builtin.apt:
        name: caddy
        state: present

    - name: Caddy systemd override dir
      ansible.builtin.file:
        path: /etc/systemd/system/caddy.service.d
        state: directory
        mode: '0755'

    - name: Caddy ACME email env (systemd override)
      ansible.builtin.copy:
        dest: /etc/systemd/system/caddy.service.d/override.conf
        mode: '0644'
        content: |
          [Service]
          Environment=ACME_EMAIL={{ acme_email }}
      register: caddy_override

    - name: Caddyfile
      ansible.builtin.copy:
        src: Caddyfile
        dest: /etc/caddy/Caddyfile
        owner: root
        group: root
        mode: '0644'
      register: caddyfile

    - name: systemd daemon-reload (caddy override changed)
      ansible.builtin.systemd:
        daemon_reload: true
      when: caddy_override.changed

    - name: Caddy — enable + start
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: started

    - name: Caddy — reload on config change
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
      when: caddyfile.changed or caddy_override.changed

    # --- app quadlet --------------------------------------------------------

    - name: Quadlet dir for deploy user
      ansible.builtin.file:
        path: "/home/{{ deploy_user }}/.config/containers/systemd"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0755'

    - name: App Quadlet unit
      ansible.builtin.copy:
        src: "{{ app_name }}.container"
        dest: "/home/{{ deploy_user }}/.config/containers/systemd/{{ app_name }}.container"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0644'

    - name: Builds dir for deploy.sh
      ansible.builtin.file:
        path: "/home/{{ deploy_user }}/builds"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0755'

  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted
